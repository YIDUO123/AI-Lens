name: High-Frequency Data Fetch

# 绕开 Vercel Hobby "每天一次 cron" 限制:
# GitHub Actions 免费公开 repo 无限跑,每 30 分钟触发一次生产环境的 fetch 端点
# 全免费 · 用你的 CRON_SECRET 保护
#
# 提前需要在 GitHub repo 设置里配置 secrets:
#   - CRON_SECRET     · 和 Vercel 里一样的那个
#   - PROD_URL        · 你的生产域名, 如 https://ai-lens-six.vercel.app

on:
  schedule:
    - cron: '*/30 * * * *'   # 每 30 分钟
  workflow_dispatch:            # 允许手动触发(方便测试)

# 保证同时最多 1 个 workflow 在跑, 避免 API 撞车
concurrency:
  group: high-freq-fetch
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch AI news
        run: |
          curl -sS -f -m 90 \
            "${{ secrets.PROD_URL }}/api/cron/news?token=${{ secrets.CRON_SECRET }}" \
            | head -c 500
          echo ""

  fetch-models:
    runs-on: ubuntu-latest
    # 模型对比每小时刷一次就够,不必 30 分钟
    if: ${{ github.event.schedule == null || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Fetch OpenRouter models
        run: |
          curl -sS -f -m 90 \
            "${{ secrets.PROD_URL }}/api/cron/models?token=${{ secrets.CRON_SECRET }}" \
            | head -c 500
          echo ""
