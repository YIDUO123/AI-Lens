# 每月 1 号跑 · 归档上月分析数据(替代 Vercel Analytics 30 天数据消失问题)
#
# 需要 GitHub Secrets:
#   - CRON_SECRET  · 和生产 env 里同名
#   - PROD_URL     · 你的生产域名 · 例 https://ailens.cloud

name: Monthly Analytics Snapshot

on:
  schedule:
    - cron: '17 3 1 * *'   # 每月 1 号 UTC 03:17(北京 11:17)
  workflow_dispatch:        # 允许手动触发 · 可传 month 参数

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Fire monthly snapshot cron
        run: |
          echo "Snapshotting to ${{ secrets.PROD_URL }}/api/cron/analytics-snapshot"
          curl -sS -f -m 60 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PROD_URL }}/api/cron/analytics-snapshot" \
            | head -c 2000
          echo ""
